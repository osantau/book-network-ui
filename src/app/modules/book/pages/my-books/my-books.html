<h3>My Book List</h3>
<hr>
<div class="d-flex justify-content-end mb-3">
<a routerLink="/books/manage" class="btn btn-outline-primary">
  <i class="fas fa-plus"></i>&nbsp;
  New Book</a>
</div>
<div class="d-flex justify-content-start gap-2 flex-wrap">
  @for (book of bookResponse.content; track book.id) {
    <app-book-card [_book]="book" [_manage]="true" (archive)="archiveBook($event)" (share)="shareBook($event)" (edit)="editBook($event)"></app-book-card>
  } @empty {
  <p>No books found.</p>
  }
</div>
<app-pagination
  [totalItems]="bookResponse.totalElements??0"
  [pageSize]="size"
  [(currentPage)]="page"
  (pageChange)="onPageChange($event)">
</app-pagination>
