<h3>Book List</h3>
@if(message) {
  <div class="alert alert-{{ level }}" role="alert">
    {{ message }}
  </div>
}
<hr>
<div class="d-flex justify-content-start gap-2 flex-wrap">
  @for (book of bookResponse.content; track book.id) {
    <app-book-card [_book]="book" (borrow)="borrowBook($event)"></app-book-card>
  } @empty {
  <p>No books found.</p>
  }
</div>
<app-pagination
  [totalItems]="bookResponse.totalElements??0"
  [pageSize]="size"
  [(currentPage)]="page"
  (pageChange)="onPageChange($event)">
</app-pagination>
