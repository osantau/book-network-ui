<div class="p-2">
  <h2>Manage my book</h2>
  <hr>
  @if(errorMsg.length>0){
  <div class="alert alert-danger mt-2" role="alert">
    @for(msg of errorMsg; track msg){
    <p class="p-0 m-0">{{msg}}</p>
    }
  </div>
  }
  <div class="d-flex gap-2">
    <div class="col-3">
      <img class="rounded-1" width="100%" height="100%"
        [src]="selectedPicture || `https://placehold.co/600x400?text=No+Image`" alt="...">
      <div class="mt-2">
        <input (change)="onFileSelected($event)" type="file" id="formFile" class="form-control" accept="image/*">
      </div>
    </div>
    <div class="col-9">
      <form class="row g-3">
        <div class="col-12">
          <label for="title" class="form-label">Title</label>
          <input [(ngModel)]="bookRequest.title" name="title" type="text" class="form-control" id="title" placeholder="Book Title">
        </div>
        <div class="col-6">
          <label for="author" class="form-label">Author Name</label>
          <input [(ngModel)]="bookRequest.authorName" name="author" type="text" class="form-control" id="author" placeholder="Author Name">
        </div>
        <div class="col-6">
          <label for="isbn" class="form-label">ISBN</label>
          <input [(ngModel)]="bookRequest.isbn" name="isbn" type="text" class="form-control" id="isbn" placeholder="Book ISBN">
        </div>
        <div class="col-12">
          <label for="synopsis" class="form-label">Synopsis</label>
          <textarea [(ngModel)]="bookRequest.synopsis" name="synopis" rows="4" class="form-control" id="synopsis" placeholder="Book Synopsis"></textarea>
        </div>
        <div class="col-12">
          <input type="checkbox" [(ngModel)]="bookRequest.shareable" name="shareable" rows="4" class="form-check-input" id="shareme">
          <label for="shareme" class="form-check-label">Share me</label>
        </div>
        <div class="d-flex justify-content-end gap-2 col-12">
          <button (click)="saveBook()" type="button" class="btn btn-outline-primary"><i class="fas fa-save"></i>&nbsp;Save</button>
          <a routerLink="/books/my-books" class="btn btn-link text-danger"><i class="fas fa-times"></i>&nbsp;Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
