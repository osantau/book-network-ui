<div class="container-fluid card login-container">
  <h3 class="text-center">Login</h3>
  <hr>
  @if (errorMsg.length>0) {
  <div class="alert alert-danger" role="alert">
    @for(msg of errorMsg; track msg){
    <p>{{ msg }}</p>
    }
  </div>
  }
  <div class="mb-3">
    <label for="login" class="form-label">Email address</label>
    <input type="email" class="form-control" id="login" placeholder="name@example.com" [(ngModel)]="authRequest.email">
    <label for="password" class="form-label">Password</label>
    <input type="password" class="form-control" id="password" placeholder="Password" [(ngModel)]="authRequest.password">
  </div>
  <div class="d-flex justify-content-between mb-3">
    <button type="button" class="btn btn-primary" (click)="login()"><em class="fas fa-sign-in-alt">&nbsp;</em>Sign in</button>
    <div>
      Don't have an account?&nbsp;
      <button type="button" class="btn btn-link" (click)="register()">Register</button>
    </div>
  </div>
