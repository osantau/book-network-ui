@if(submitted) {
<div class="container">

  @if(isOk) {
  <div class="activate-message">
    <h2>Account activated successfully!</h2>
    <button class="btn btn-primary" (click)="redirectToLogin()">Go to Login</button>
  </div>
  } @else {
  <div class="activate-error">
    <h2>Activation failed</h2>
    <p>{{ message }}</p>
    <button class="btn btn-secondary" (click)="submitted = false">Try Again</button>
  </div>
  }

</div>
} @else {
<ng-container *ngTemplateOutlet="codeForm"></ng-container>
}

<ng-template #codeForm>
  <div class="container">
    <div class="text-center" style="width: 400px;">
      <h2>Type your activation code</h2>
      <code-input [isCodeHidden]="false" [codeLength]="6" [code]="'number'"
        (codeCompleted)="onCodeCompleted($event);"></code-input>
    </div>
  </div>
</ng-template>
